version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shangyin-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_DIALECT=mysql
      - DB_HOST=82.156.83.99
      - DB_PORT=3306
      - DB_USER=shangyin
      - DB_PASS=shaoyansa
      - DB_NAME=shangyin
      - JWT_SECRET=${JWT_SECRET:-shangyin_jwt_secret_change_in_production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - shangyin-network
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/shangyin/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 管理后台前端
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: shangyin-admin
    restart: always
    ports:
      - "14444:80"
    depends_on:
      - backend
    networks:
      - shangyin-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  shangyin-network:
    driver: bridge
