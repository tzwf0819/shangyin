version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shangyin-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_DIALECT=${DB_DIALECT:-mysql}
      - DB_HOST=${DB_HOST:-82.156.83.99}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-shangyin}
      - DB_PASS=${DB_PASS:-shaoyansa}
      - DB_NAME=${DB_NAME:-shangyin}
      - JWT_SECRET=${JWT_SECRET:-shangyin_jwt_secret_change_in_production}
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/database:/app/database
    networks:
      - shangyin-network
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/shangyin/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 管理后台前端
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: shangyin-admin
    restart: always
    ports:
      - "14444:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shangyin-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/shangyin/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  shangyin-network:
    driver: bridge
