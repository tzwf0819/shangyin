name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TENCENT_SSH_KEY }}

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.TENCENT_SSH_HOST }}
          SSH_USER: ${{ secrets.TENCENT_SSH_USER }}
          SSH_PORT: 22
        run: |
          set -euo pipefail

          echo "=== 🚀 开始部署商印项目 ==="
          echo "📍 目标服务器：$SSH_HOST"
          echo "🔌 SSH 用户：$SSH_USER"

          PROJECT_DIR="/opt/shangyin"

          # 备份 .env 文件
          echo "📦 备份现有配置..."
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            if [ -f '$PROJECT_DIR/.env' ]; then
              sudo cp '$PROJECT_DIR/.env' '$PROJECT_DIR/.env.backup.\$(date +%Y%m%d_%H%M%S)'
              echo '✅ 备份完成'
            else
              echo '⚠️ 无现有配置文件'
            fi
          "

          # 拉取最新代码
          echo "📥 拉取最新代码..."
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            cd '$PROJECT_DIR'
            git fetch origin main
            sudo git reset --hard origin/main
            echo '✅ 代码更新完成'
          "

          # 恢复 .env 文件
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            if ls '$PROJECT_DIR'/.env.backup.* 1>/dev/null 2>&1; then
              latest_backup=\$(ls -t '$PROJECT_DIR'/.env.backup.* | head -1)
              sudo cp '\$latest_backup' '$PROJECT_DIR/.env'
              echo '✅ 已恢复环境变量配置'
            fi
          "

          # 检查 .env 是否存在
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            if [ ! -f '$PROJECT_DIR/.env' ]; then
              echo '⚠️ 创建默认 .env 文件...'
              sudo tee '$PROJECT_DIR/.env' > /dev/null <<EOF
            NODE_ENV=production
            DB_DIALECT=mysql
            DB_HOST=82.156.83.99
            DB_PORT=3306
            DB_USER=shangyin
            DB_PASS=shaoyansa
            DB_NAME=shangyin
            JWT_SECRET=shangyin_jwt_secret_\$(date +%s)
            EOF
            fi
          "

          # 确保 Docker 环境就绪
          echo "🐳 检查 Docker 环境..."
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            if ! command -v docker &> /dev/null; then
              echo '安装 Docker...'
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
            fi

            if ! command -v docker-compose &> /dev/null && ! docker compose version &> /dev/null; then
              echo '安装 Docker Compose...'
              sudo apt-get update
              sudo apt-get install -y docker-compose
            fi
            echo '✅ Docker 环境就绪'
          "

          # 停止旧容器
          echo "🛑 停止旧容器..."
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            cd '$PROJECT_DIR'
            sudo docker compose down || true
            echo '✅ 旧容器已停止'
          "

          # 清理悬空镜像
          echo "🧹 清理悬空镜像..."
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            sudo docker image prune -f || true
            echo '✅ 清理完成'
          "

          # 构建并启动
          echo "🔨 构建 Docker 镜像..."
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            cd '$PROJECT_DIR'
            sudo docker compose build --no-cache
          "

          echo "🚀 启动服务..."
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            cd '$PROJECT_DIR'
            sudo docker compose up -d
          "

          # 等待服务启动
          echo "⏳ 等待服务健康检查..."
          sleep 15

          # 检查容器状态
          echo "📊 容器状态:"
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            cd '$PROJECT_DIR'
            sudo docker compose ps
          "

          # 显示日志
          echo "📋 最近日志:"
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            cd '$PROJECT_DIR'
            sudo docker compose logs --tail=30
          "

          # 验证服务
          echo "🔍 验证服务..."
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            echo '检查 admin 容器 (端口 14444)...'
            sudo docker ps | grep shangyin-admin || echo '⚠️ admin 容器未运行'
          "

          # 清理旧备份
          echo "🗑️ 清理旧备份..."
          ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "
            ls -t '$PROJECT_DIR'/.env.backup.* 2>/dev/null | tail -n +6 | xargs rm -f 2>/dev/null || true
          "

          echo ""
          echo "=== ✅ 部署完成 ==="
          echo "🌐 访问地址：https://tzwf.xyz/shangyin/"
